<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Musicpad</title>
  <style>
    body {
      margin: 2rem;
      font-family: system-ui, sans-serif;
      background: #f7f3ea;
      color: #241f1a;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
    }

    textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 24rem;
      padding: 1rem;
      font: 1rem/1.4 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    button {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      font: inherit;
      cursor: pointer;
    }

    #status {
      margin-top: 0.75rem;
      min-height: 1.5rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Musicpad</h1>

    <textarea id="source" spellcheck="false"># My Bloody Valentine, When you sleep

tempo60
|0 ch1 o6 i74 
| iBD v110
| iSD stress25
| iOH v80
| ch2 o3 i33
| ch3 o5 i50
| ch3 o5 t+4
| ch3 o5 t-5

m$flute( o/16 B = n+1 n-1 = G = E == F E = C = A =*12 G === )
m$bass( C/16*8 D*8 F*16 )
m$guit( C/2 n+2 F/1 )
m$bd1( o/16 xx-x*7 xxxx )
m$oh1( o/16 xxxx*7 ---- )
m$oh2( o/16 xxxx*8 )
m$sd1( o/16 --x---x o/32 -,x o/16 --x-*5 $sdroll )
m$sd2( o/16 --x-*3 --x o/32 -,x o/16 --x-*4 )
m$sdroll (o/32 'xx'xx'xx'xx )
m$bdroll (o/16 'x'x'x'x )
m$pause( P/4 )

m$intro ( |0 $pause | $bdroll | $sdroll | $pause | $pause | $pause | $pause | $pause )
m$bar1 ( |0 $flute | $bd1 | $sd1 | $oh1 | $bass | $guit | $guit | $guit )
m$bar2 ( |0 $flute | $bd1 | $sd2 | $oh2 | $bass | $guit | $guit | $guit )

$intro ($bar2 $bar1)*2</textarea>

    <button id="download" type="button">Generate</button>
    <div id="status" role="status" aria-live="polite"></div>
  </main>

  <script src="./musicpad.js"></script>
  <script>
    const source = document.getElementById('source');
    const download = document.getElementById('download');
    const status = document.getElementById('status');

    download.addEventListener('click', () => {
      try {
        const midi = musicpadToMidi(source.value);
        const blob = new Blob([midi], { type: 'audio/midi' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');

        link.href = url;
        link.download = 'musicpad.mid';
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);

        status.textContent = `Generated ${midi.length} bytes and started download.`;
      } catch (error) {
        status.textContent = error.message;
      }
    });
  </script>
</body>
</html>
